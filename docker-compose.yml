
services:
  postgres-dev:
    image: postgres:16
    container_name: postgres-db-dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: dev_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: adamwahyukur
    restart: always

  postgres-pro:
    image: postgres:16
    container_name: postgres-db-pro
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_pro:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: pro_db
      POSTGRES_USER: pro_user
      POSTGRES_PASSWORD: adamwahyukur
    restart: always

  backend:
    build: ./be
    container_name: backend-api
    
    ports:
      - "5000:5000"
    volumes:
      - ./be:/app
      - /app/node_modules
    depends_on:
      - postgres-dev
    environment:
      - DATABASE_URL=postgresql://dev_user:adamwahyukur@postgres-dev:5432/dev_db
      - PORT=5000
      - NODE_ENV=development
    restart: always

  frontend:
    build: ./fe
    container_name: frontend-app
    ports:
      - "3000:3000"
    volumes:
      - ./fe:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    restart: always

volumes:
  postgres_data_dev:
  postgres_data_pro:
